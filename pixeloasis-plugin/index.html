<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PixelOasis</title>
    <link rel="stylesheet" href="./panel.css" />
  </head>
  <body>
    <div id="app"></div>

    <!-- Foundation: text, state & logger -->
    <script src="./scripts/ui-text.js"></script>
    <script src="./scripts/state.js"></script>
    <script src="./scripts/logger.js"></script>

    <!-- v2: API & data layer -->
    <script src="./scripts/api/api-errors.js"></script>
    <script src="./scripts/capabilities/capability-labels.js"></script>
    <script src="./scripts/capabilities/favorites-store.js"></script>
    <script src="./scripts/capabilities/capability-store.js"></script>

    <!-- v2: Capture layer -->
    <script src="./scripts/capture/capture-utils.js"></script>
    <script src="./scripts/capture/document-capture.js"></script>
    <script src="./scripts/capture/selection-capture.js"></script>
    <script src="./scripts/capture/subject-capture.js"></script>

    <!-- v2: Preflight & parameter form -->
    <script src="./scripts/capabilities/preflight.js"></script>
    <script src="./scripts/capabilities/parameter-form.js"></script>

    <!-- Vendor: pure-JS PNG encoder (loaded before photoshop.js) -->
    <script src="./scripts/vendor/png-encoder.js"></script>

    <!-- v1 compat: photoshop & gateway layer -->
    <script src="./scripts/gateway-client.js"></script>
    <script src="./scripts/photoshop.js"></script>
    <script src="./scripts/photoshop-place-layer.js"></script>
    <script src="./scripts/placement-engine.js"></script>

    <!-- v2: UI rendering -->
    <script src="./scripts/ui/capability-sections.js"></script>
    <script src="./scripts/ui/parameter-panel.js"></script>

    <!-- v1 compat: UI modules (status, preview, settings, parameters, workflows) -->
    <script src="./scripts/ui-status.js"></script>
    <script src="./scripts/ui-preview.js"></script>
    <script src="./scripts/ui-settings.js"></script>
    <script src="./scripts/ui-workflows.js"></script>
    <script src="./scripts/ui-parameters.js"></script>

    <!-- v2: Capability controller (after UI modules for dependencies) -->
    <script src="./scripts/capabilities/capability-controller.js"></script>

    <!-- v2: Gateway client, asset uploader, jobs -->
    <script src="./scripts/api/gateway-v2-client.js"></script>
    <script src="./scripts/capture/asset-uploader.js"></script>
    <script src="./scripts/jobs/job-store.js"></script>
    <script src="./scripts/jobs/job-events.js"></script>
    <script src="./scripts/jobs/job-controller.js"></script>

    <!-- v2: Placement (artifact download, place, mask, metadata, group) -->
    <script src="./scripts/placement/artifact-downloader.js"></script>
    <script src="./scripts/placement/artifact-placer.js"></script>
    <script src="./scripts/placement/mask-placer.js"></script>
    <script src="./scripts/placement/layer-metadata.js"></script>
    <script src="./scripts/placement/result-group.js"></script>

    <!-- v2: Legacy migration + environment -->
    <script src="./scripts/legacy/v1-workflow-map.js"></script>
    <script src="./scripts/ui/first-run-panel.js"></script>

    <!-- v2: Progress & result panels -->
    <script src="./scripts/ui/progress-panel.js"></script>
    <script src="./scripts/ui/result-panel.js"></script>

    <!-- Template (delegates to capability-sections in v2) -->
    <script src="./scripts/ui-template.js"></script>

    <!-- Event handlers & binding -->
    <script src="./scripts/actions.js"></script>

    <!-- Assembly & startup -->
    <script src="./index.js"></script>
  </body>
</html>
