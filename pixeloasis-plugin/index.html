<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PixelOasis</title>
    <link rel="stylesheet" href="./panel.css" />
  </head>
  <body>
    <div id="app"></div>

    <!-- Foundation: text, state & logger -->
    <script src="./scripts/ui-text.js"></script>
    <script src="./scripts/state.js"></script>
    <script src="./scripts/logger.js"></script>

    <!-- Template -->
    <script src="./scripts/ui-template.js"></script>

    <!-- Workflow definitions (before parameter page) -->
    <script src="./scripts/ui-workflows.js"></script>

    <!-- Vendor: pure-JS PNG encoder (loaded before photoshop.js) -->
    <script src="./scripts/vendor/png-encoder.js"></script>

    <!-- Gateway client -->
    <script src="./scripts/gateway-client.js"></script>

    <!-- Photoshop API layer -->
    <script src="./scripts/photoshop.js"></script>
    <script src="./scripts/photoshop-place-layer.js"></script>

    <!-- UI modules -->
    <script src="./scripts/ui-status.js"></script>
    <script src="./scripts/ui-preview.js"></script>
    <script src="./scripts/ui-settings.js"></script>
    <script src="./scripts/ui-parameters.js"></script>

    <!-- Event handlers & binding -->
    <script src="./scripts/actions.js"></script>

    <!-- Assembly & startup -->
    <script src="./index.js"></script>
  </body>
</html>
